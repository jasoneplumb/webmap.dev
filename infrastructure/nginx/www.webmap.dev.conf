# Nginx configuration for webmap.dev
# www.webmap.dev -> Vite app from /var/www/webmap/web
# webmap.dev (apex) -> redirect to www
#
# This file should be symlinked to /etc/nginx/sites-enabled/

# Apex HTTP redirect to www
server {
    listen 80;
    listen [::]:80;
    server_name webmap.dev;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://www.webmap.dev$request_uri;
    }
}

# www HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name www.webmap.dev;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# www HTTPS - serve the Vite app
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.webmap.dev;

    ssl_certificate /etc/letsencrypt/live/www.webmap.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.webmap.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # HSTS (1 year, including subdomains)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/www.webmap.dev.access.log;
    error_log /var/log/nginx/www.webmap.dev.error.log;

    root /var/www/webmap/web;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss application/atom+xml image/svg+xml;

    # Hashed assets: long TTL (Vite appends content hash to filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML: no caching (index.html changes on every deploy)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
    }

    # Deny hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# Apex HTTPS -> redirect to www (needed for HTTPS apex domain)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name webmap.dev;

    ssl_certificate /etc/letsencrypt/live/www.webmap.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.webmap.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.webmap.dev$request_uri;
}
